<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frise Chronologique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f4ee;
  --ink: #1c1812;
  --muted: #9a8a78;
  --line: #d0c2b0;
}
html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Crimson Pro', serif;
  color: var(--ink);
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  flex-shrink: 0;
  z-index: 100;
  position: relative;
}
.topbar-hint {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
}
.pdf-btn {
  display: flex; align-items: center; gap: 7px;
  background: none; border: 1px solid var(--muted);
  color: var(--muted); padding: 5px 14px;
  font-family: 'Crimson Pro', serif; font-size: 13px;
  cursor: pointer; border-radius: 2px; letter-spacing: 0.4px;
  transition: all 0.18s;
}
.pdf-btn:hover { border-color: var(--ink); color: var(--ink); }

/* SCROLL */
.scroll-wrapper {
  width: 100%;
  height: calc(100vh - 42px);
  overflow-x: auto;
  overflow-y: hidden;
  user-select: none;
}

/* CANVAS */
.canvas {
  position: relative;
  cursor: grab;
}
.canvas.panning { cursor: grabbing; }
.canvas.dragging-card { cursor: ns-resize; }

/* ERA BAND */
.era-band {
  position: absolute;
  display: flex;
  align-items: center;
  padding-left: 7px;
  overflow: hidden;
  pointer-events: none;
}
.era-band-label {
  font-family: 'Playfair Display', serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: white; white-space: nowrap;
}

/* AXIS */
.axis-line {
  position: absolute;
  left: 0; right: 0; height: 2px;
  background: var(--ink); opacity: 0.15;
  pointer-events: none;
}

/* TICK */
.yr-tick {
  position: absolute;
  width: 1px; background: var(--muted);
  opacity: 0.35; transform: translateX(-50%);
  pointer-events: none;
}
.yr-tick.major { opacity: 0.6; }

/* SVG stems layer */
.stems-svg {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 1;
  overflow: visible;
}

/* DOT */
.evt-dot {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  border: 2px solid var(--bg);
  pointer-events: none;
}

/* CARD */
.evt-card {
  position: absolute;
  width: 144px;
  background: white;
  border-top: 2px solid;
  padding: 5px 8px 7px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.07);
  z-index: 4;
  cursor: ns-resize;
  transition: box-shadow 0.15s;
}
.evt-card:hover { box-shadow: 0 3px 16px rgba(0,0,0,0.14); z-index: 10; }
.evt-card.dragging {
  box-shadow: 0 8px 28px rgba(0,0,0,0.22);
  z-index: 100;
  opacity: 0.92;
}
.evt-year {
  font-family: 'Playfair Display', serif;
  font-size: 11px; font-weight: 700;
  display: block; margin-bottom: 2px;
}
.evt-text {
  font-size: 11px; line-height: 1.38; color: #3a3028;
}

/* LEGEND */
.legend {
  position: fixed; bottom: 14px; left: 20px;
  display: flex; gap: 16px; flex-wrap: wrap;
  z-index: 50; pointer-events: none;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted);
  font-family: 'Crimson Pro', serif;
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.38); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white; padding: 36px 40px;
  max-width: 360px; width: 90%; text-align: center;
}
.modal-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.modal-body { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 22px; }
.modal-close { background: var(--ink); color: white; border: none; padding: 9px 22px; font-family: 'Crimson Pro', serif; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-hint">↕ Glissez les fiches verticalement · ← → Naviguez horizontalement</span>
  <button class="pdf-btn" onclick="exportPDF()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Exporter PDF
  </button>
</div>

<div class="scroll-wrapper" id="scrollWrapper">
  <div class="canvas" id="canvas"></div>
</div>

<div class="legend" id="legend"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Export PDF</div>
    <div class="modal-body" id="modalBody">Génération en cours…</div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">Fermer</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const eras = [
  { id:1, label:"Restauration",         start:1790, end:1830, color:"#8b2e1a" },
  { id:2, label:"Monarchie de Juillet", start:1830, end:1848, color:"#1a5c8b" },
  { id:3, label:"IIe République",       start:1848, end:1852, color:"#1a7a42" },
  { id:4, label:"Second Empire",        start:1852, end:1870, color:"#6b1a8b" },
  { id:5, label:"IIIe République",      start:1870, end:1882, color:"#8b6a1a" },
];

const allEvents = [
  { y:1790,    e:1, t:"Constitution civile du clergé" },
  { y:1800,    e:1, t:"Création de la Banque de France" },
  { y:1804,    e:1, t:"Code Civil — compromis révolutionnaire" },
  { y:1814,    e:1, t:"Octroi de la Charte de 1814" },
  { y:1815,    e:1, t:"Waterloo (18 juin) ; abdication de Napoléon ; rétablissement de la monarchie" },
  { y:1816,    e:1, t:"Crise de subsistance ; Missions de France ; dissolution Chambre introuvable" },
  { y:1818,    e:1, t:"Fin du ministère Richelieu → Decazes" },
  { y:1820,    e:1, t:"Agrégation créée ; assassinat du duc de Berry ; retour de Richelieu" },
  { y:1821,    e:1, t:"Triomphe des ultras — Villèle succède à Richelieu" },
  { y:1822,    e:1, t:"Suppression ENS ; suspension de Guizot à la Sorbonne" },
  { y:1823,    e:1, t:"Dissolution par Villèle" },
  { y:1824,    e:1, t:"Mort de Louis XVIII — Charles X lui succède" },
  { y:1825,    e:1, t:"Loi du milliard des émigrés ; sacre de Charles X à Reims" },
  { y:1826,    e:1, t:"Échecs législatifs sur le patrimoine et la presse" },
  { y:1827,    e:1, t:"Fondation « Aide-toi » ; dissolution ; démission de Villèle" },
  { y:1828,    e:1, t:"Ministère Martignac (janvier)" },
  { y:1829,    e:1, t:"Ministère Polignac (8 août)" },
  { y:1830,    e:1, t:"Adresse des 221 (mars) ; 4 ordonnances ; Trois Glorieuses (27–29 juil.)" },
  { y:1830.7,  e:2, t:"Louis-Philippe Ier proclamé Roi des Français (9 août)" },
  { y:1831,    e:2, t:"Lois abaissant le cens ; révolte des Canuts à Lyon" },
  { y:1832,    e:2, t:"Mort de Casimir Perier (choléra) ; insurrection de juin" },
  { y:1834,    e:2, t:"Répression sanglante à Lyon (avril)" },
  { y:1837,    e:2, t:"Instabilité ministérielle sous Thiers ; dissolution (octobre)" },
  { y:1839,    e:2, t:"Nouvelle dissolution" },
  { y:1840,    e:2, t:"Début du « moment Guizot » — stabilité" },
  { y:1842,    e:2, t:"Loi sur le réseau ferré en étoile ; dissolution" },
  { y:1846,    e:2, t:"Découverte de Neptune ; dissolution (juillet)" },
  { y:1847,    e:2, t:"Crise agricole et financière ; campagne des banquets" },
  { y:1848.05, e:3, t:"Interdiction du banquet parisien ; abdication du roi ; République (24 fév.)" },
  { y:1848.3,  e:3, t:"Ateliers nationaux (26 fév.) ; suffrage universel masculin ; élections (23 avr.)" },
  { y:1848.5,  e:3, t:"Fermeture ateliers nationaux (21 juin) ; insurrection ; état de siège (24 juin)" },
  { y:1848.9,  e:3, t:"Nouvelle Constitution (nov.) ; élection de Louis-Napoléon Bonaparte (10 déc.)" },
  { y:1849.4,  e:3, t:"Élections législatives (mai) ; manifestation du 13 juin" },
  { y:1849.6,  e:3, t:"Loi restrictive sur la presse (juillet)" },
  { y:1850.2,  e:3, t:"Loi Falloux sur l'enseignement libre (15 mars)" },
  { y:1851.9,  e:3, t:"Coup d'État de Louis-Napoléon Bonaparte (2 déc.)" },
  { y:1852.0,  e:4, t:"Constitution de 1852 ; censure ; proclamation du Second Empire (25 déc.)" },
  { y:1854,    e:4, t:"Grands travaux d'Haussmann — rénovation de Paris (1853–1869)" },
  { y:1857,    e:4, t:"Début de l'opposition républicaine organisée" },
  { y:1858.05, e:4, t:"Attentat d'Orsini (14 janv.) ; loi de sûreté générale" },
  { y:1859,    e:4, t:"Loi d'amnistie pour les proscrits politiques" },
  { y:1860,    e:4, t:"Traité de libre-échange avec l'Angleterre" },
  { y:1862,    e:4, t:"Grève des typographes ; grâce impériale" },
  { y:1863.4,  e:4, t:"Retour de Thiers à la chambre (mai)" },
  { y:1864,    e:4, t:"Manifeste des Soixante ; reconnaissance du droit de grève" },
  { y:1865,    e:4, t:"Autorisation paiement par chèque ; projet Duruy sur l'école" },
  { y:1866.5,  e:4, t:"Bataille de Sadowa (3 juillet)" },
  { y:1867,    e:4, t:"Libéralisation (presse, réunion, interpellation) ; sociétés anonymes ; Exposition Universelle" },
  { y:1869.95, e:4, t:"Le chef du gouvernement doit être issu de la majorité (27 déc.)" },
  { y:1870.3,  e:4, t:"Ministère Ollivier (2 janv.) ; constitution libérale (20 avr.) ; plébiscite (8 mai)" },
  { y:1870.55, e:5, t:"Guerre contre la Prusse ; défaite de Sedan ; République (4 sept.) ; siège de Paris ; décret Crémieux" },
  { y:1871,    e:5, t:"Armistice (28 janv.) ; Commune de Paris (29 mars) ; Paix de Francfort (10 mai)" },
  { y:1873.1,  e:5, t:"Mort de Napoléon III (9 janv.) ; pouvoirs de Thiers limités ; Mac-Mahon président (24 mai)" },
  { y:1873.9,  e:5, t:"Loi de septennalité (19 nov.) ; ministère de Broglie" },
  { y:1875.08, e:5, t:"Amendement Wallon (30 janv.) — Président élu par le Parlement" },
  { y:1876.1,  e:5, t:"Victoire républicaine aux législatives (hiver)" },
  { y:1877,    e:5, t:"Simon contre le cléricalisme (4 mai) ; crise du 16 mai ; dissolution" },
  { y:1879.08, e:5, t:"Démission de Mac-Mahon ; élection de Jules Grévy (30 janv.)" },
  { y:1880,    e:5, t:"Loi Camille Sée — lycées de jeunes filles" },
  { y:1881,    e:5, t:"Paris concentre 17 % des citadins français" },
];

// ── LAYOUT ────────────────────────────────────────────────────────────────
const PX_PER_YEAR = 90;
const Y_START     = 1787;
const Y_END       = 1883;
const PAD_L       = 60;
const PAD_R       = 60;
const CARD_W      = 144;
const CARD_H      = 58;
const VIEWPORT_H  = window.innerHeight - 42;
const AXIS_Y      = Math.round(VIEWPORT_H * 0.5);
const TOTAL_W     = PAD_L + (Y_END - Y_START) * PX_PER_YEAR + PAD_R;
const CANVAS_H    = VIEWPORT_H;
const ERA_BAND_H  = 18;
const ERA_BAND_Y  = AXIS_Y - ERA_BAND_H - 10;

// Min/max card top (keep cards within canvas)
const CARD_TOP_MIN = 4;
const CARD_TOP_MAX = CANVAS_H - CARD_H - 4;

function xOf(yr) { return PAD_L + (yr - Y_START) * PX_PER_YEAR; }

// ── INITIAL PLACEMENT (collision-free) ────────────────────────────────────
const sorted = [...allEvents].sort((a, b) => a.y - b.y);
const placedUp = [], placedDn = [];

function overlaps(r1, r2) {
  return !(r1.x2 + 6 < r2.x1 || r2.x2 + 6 < r1.x1 || r1.y2 < r2.y1 || r2.y2 < r1.y1);
}

function findCardTop(x, preferUp) {
  const cx1 = x - CARD_W / 2, cx2 = x + CARD_W / 2;
  const maxUp = AXIS_Y - ERA_BAND_H - 14 - CARD_H;
  const maxDn = CANVAS_H - CARD_H - 4;
  const step  = 6;

  for (const [goUp, pool] of preferUp
      ? [[true, placedUp],[false, placedDn]]
      : [[false, placedDn],[true, placedUp]]) {
    const start = goUp ? AXIS_Y - 20 - CARD_H : AXIS_Y + 20;
    const limit = goUp ? CARD_TOP_MIN : maxDn;
    const dir   = goUp ? -step : step;

    for (let t = start; goUp ? t >= limit : t <= limit; t += dir) {
      const r = { x1: cx1, x2: cx2, y1: t, y2: t + CARD_H };
      if (!pool.some(p => overlaps(r, p))) {
        pool.push(r);
        return { cardTop: t, up: goUp };
      }
    }
  }
  // Fallback
  const t = preferUp ? CARD_TOP_MIN : CARD_TOP_MAX;
  (preferUp ? placedUp : placedDn).push({ x1:cx1, x2:cx2, y1:t, y2:t+CARD_H });
  return { cardTop: t, up: preferUp };
}

// ── BUILD DOM ─────────────────────────────────────────────────────────────
const canvasEl = document.getElementById('canvas');
canvasEl.style.cssText = `width:${TOTAL_W}px;height:${CANVAS_H}px;position:relative;`;

// SVG stems layer
const stemsSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
stemsSvg.setAttribute('width', TOTAL_W);
stemsSvg.setAttribute('height', CANVAS_H);
stemsSvg.style.cssText = `position:absolute;top:0;left:0;pointer-events:none;z-index:1;overflow:visible;`;
canvasEl.appendChild(stemsSvg);

// Era bands
eras.forEach(era => {
  const x1 = xOf(era.start), x2 = xOf(era.end);
  const band = document.createElement('div');
  band.className = 'era-band';
  Object.assign(band.style, {
    left: x1+'px', top: ERA_BAND_Y+'px',
    width: (x2-x1)+'px', height: ERA_BAND_H+'px',
    background: era.color, opacity:'0.88',
  });
  band.innerHTML = `<span class="era-band-label">${era.label}</span>`;
  canvasEl.appendChild(band);
});

// Axis
const axisEl = document.createElement('div');
axisEl.className = 'axis-line';
axisEl.style.top = AXIS_Y + 'px';
canvasEl.appendChild(axisEl);

// Ticks
for (let yr = Math.ceil(Y_START/5)*5; yr <= Y_END; yr += 5) {
  const major = yr % 10 === 0;
  const x = xOf(yr), h = major ? 10 : 5;
  const tick = document.createElement('div');
  tick.className = 'yr-tick' + (major?' major':'');
  Object.assign(tick.style, { left:x+'px', top:(AXIS_Y-h/2)+'px', height:h+'px' });
  canvasEl.appendChild(tick);
}

// ── EVENT NODES ───────────────────────────────────────────────────────────
// Each event node: { data, x, cardTop, stemLine (SVG line), dot (div), card (div) }
const nodes = [];

sorted.forEach(ev => {
  const x     = xOf(ev.y);
  const era   = eras.find(e => e.id === ev.e);
  const color = era ? era.color : '#888';
  const prefUp = ev.e % 2 === 1;
  const { cardTop } = findCardTop(x, prefUp);

  // SVG stem line
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '1');
  line.setAttribute('opacity', '0.3');
  stemsSvg.appendChild(line);

  // Dot
  const dot = document.createElement('div');
  dot.className = 'evt-dot';
  Object.assign(dot.style, { left:x+'px', top:AXIS_Y+'px', background:color });
  canvasEl.appendChild(dot);

  // Card
  const card = document.createElement('div');
  card.className = 'evt-card';
  Object.assign(card.style, {
    left: (x - CARD_W/2)+'px',
    top:  cardTop+'px',
    borderTopColor: color,
    width: CARD_W+'px',
  });
  card.innerHTML = `<span class="evt-year" style="color:${color}">${Math.floor(ev.y)}</span><span class="evt-text">${ev.t}</span>`;
  canvasEl.appendChild(card);

  const node = { data: ev, x, cardTop, color, line, dot, card };
  nodes.push(node);
  updateStem(node);
});

function updateStem(node) {
  const cardCenterX = node.x;
  // stem connects dot (axis) to middle-bottom or middle-top of card
  const dotY = AXIS_Y;
  const isUp = node.cardTop + CARD_H < AXIS_Y;
  const cardEdgeY = isUp ? node.cardTop + CARD_H : node.cardTop;
  node.line.setAttribute('x1', cardCenterX);
  node.line.setAttribute('y1', dotY);
  node.line.setAttribute('x2', cardCenterX);
  node.line.setAttribute('y2', cardEdgeY);
}

// ── DRAG BEHAVIOUR ────────────────────────────────────────────────────────
// Two modes:
// 1. Dragging a card → move it vertically
// 2. Dragging canvas background → pan horizontally

let activeCardNode = null;  // card being dragged
let cardDragStartY = 0;
let cardDragStartTop = 0;

let panning = false;
let panStartX = 0;
let panScrollLeft = 0;

const sw = document.getElementById('scrollWrapper');

// CARD drag start
nodes.forEach(node => {
  node.card.addEventListener('mousedown', e => {
    e.stopPropagation();
    activeCardNode = node;
    cardDragStartY   = e.clientY;
    cardDragStartTop = node.cardTop;
    node.card.classList.add('dragging');
    canvasEl.classList.add('dragging-card');
  });
});

// CANVAS pan start
canvasEl.addEventListener('mousedown', e => {
  if (activeCardNode) return; // already handled
  panning = true;
  panStartX    = e.clientX;
  panScrollLeft = sw.scrollLeft;
  canvasEl.classList.add('panning');
});

window.addEventListener('mousemove', e => {
  if (activeCardNode) {
    const delta = e.clientY - cardDragStartY;
    let newTop = cardDragStartTop + delta;
    newTop = Math.max(CARD_TOP_MIN, Math.min(CARD_TOP_MAX, newTop));
    activeCardNode.cardTop = newTop;
    activeCardNode.card.style.top = newTop + 'px';
    updateStem(activeCardNode);
  } else if (panning) {
    sw.scrollLeft = panScrollLeft - (e.clientX - panStartX);
  }
});

window.addEventListener('mouseup', () => {
  if (activeCardNode) {
    activeCardNode.card.classList.remove('dragging');
    activeCardNode = null;
    canvasEl.classList.remove('dragging-card');
  }
  if (panning) {
    panning = false;
    canvasEl.classList.remove('panning');
  }
});

// Start scroll at ~1810
sw.scrollLeft = xOf(1810) - 80;

// ── LEGEND ─────────────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
eras.forEach(era => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${era.color}"></div>${era.label}`;
  legendEl.appendChild(item);
});

// ── PDF EXPORT ─────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
}

async function exportPDF() {
  const modal     = document.getElementById('modalOverlay');
  const modalBody = document.getElementById('modalBody');
  document.getElementById('modalTitle').textContent = 'Export PDF';
  modalBody.textContent = 'Génération en cours…';
  modal.classList.add('show');

  try {
    await new Promise(r => setTimeout(r, 80));
    const { jsPDF } = window.jspdf;

    // We'll replicate the current layout to PDF.
    // Scale factor: canvas uses PX_PER_YEAR px/yr, PDF uses pxPerYr mm/yr
    const PW = 420, PH = 297, M = 14;
    const usableW = PW - M * 2;
    const usableH = PH - M * 2;

    // Horizontal: years per page
    const pxPerYr = 2.8; // mm / year in PDF
    const ypp = Math.floor(usableW / pxPerYr);

    // Vertical scale: map canvas [0..CANVAS_H] → PDF [M..PH-M]
    const vScale = usableH / CANVAS_H;
    // Axis Y in PDF
    const pAxisY = M + AXIS_Y * vScale;

    const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a3' });

    let pageStart = Y_START;
    let first = true;

    while (pageStart < Y_END) {
      const pageEnd = Math.min(pageStart + ypp, Y_END);
      if (!first) doc.addPage();
      first = false;

      const xp = yr => M + (yr - pageStart) * pxPerYr;

      // Era bands
      eras.forEach(era => {
        const x1 = Math.max(xp(era.start), M), x2 = Math.min(xp(era.end), M + usableW);
        if (x2 <= x1) return;
        const c = hexToRgb(era.color);
        doc.setFillColor(c.r,c.g,c.b);
        const bH = ERA_BAND_H * vScale;
        const bY = M + ERA_BAND_Y * vScale;
        doc.rect(x1, bY, x2-x1, bH, 'F');
        if (x2-x1 > 10) {
          doc.setTextColor(255,255,255); doc.setFont('times','bold'); doc.setFontSize(5);
          doc.text(era.label, x1+1.5, bY + bH*0.65);
        }
      });

      // Axis
      doc.setDrawColor(30,24,18); doc.setLineWidth(0.3);
      doc.line(M, pAxisY, M+usableW, pAxisY);

      // Ticks
      for (let yr = Math.ceil(pageStart/5)*5; yr <= pageEnd; yr += 5) {
        const x = xp(yr); if (x<M-0.1||x>M+usableW+0.1) continue;
        const major = yr%10===0;
        doc.setDrawColor(150,130,110); doc.setLineWidth(0.15);
        doc.line(x, pAxisY-1, x, pAxisY+1);
        if (major) {
          doc.setFont('times','normal'); doc.setFontSize(5); doc.setTextColor(110,90,70);
          doc.text(String(yr), x, pAxisY+4, { align:'center' });
        }
      }

      // Cards — use current cardTop from nodes
      nodes.forEach(node => {
        if (node.data.y < pageStart - 0.1 || node.data.y >= pageEnd + 0.1) return;
        const x   = xp(node.data.y);
        if (x < M+0.5 || x > M+usableW-0.5) return;
        const c   = hexToRgb(node.color);

        // Card geometry in PDF (scale from canvas coords)
        const pCardW  = 30;
        const pCardH  = CARD_H * vScale;
        const pCardY  = M + node.cardTop * vScale;
        const pCardX  = x - pCardW / 2;

        // Clamp card within page
        const clampedY = Math.max(M, Math.min(PH - M - pCardH, pCardY));

        // Stem
        const isUp  = node.cardTop + CARD_H < AXIS_Y;
        const stemY = isUp ? clampedY + pCardH : clampedY;
        doc.setDrawColor(c.r,c.g,c.b); doc.setLineWidth(0.2);
        doc.line(x, pAxisY, x, stemY);

        // Dot
        doc.setFillColor(c.r,c.g,c.b); doc.circle(x, pAxisY, 0.75, 'F');

        // Card bg
        doc.setFillColor(252,249,244);
        doc.rect(pCardX, clampedY, pCardW, pCardH, 'F');
        doc.setDrawColor(c.r,c.g,c.b); doc.setLineWidth(0.45);
        doc.line(pCardX, clampedY, pCardX+pCardW, clampedY);

        // Year
        doc.setFont('times','bold'); doc.setFontSize(5.5); doc.setTextColor(c.r,c.g,c.b);
        doc.text(String(Math.floor(node.data.y)), pCardX+2, clampedY+4);

        // Text
        doc.setFont('times','normal'); doc.setFontSize(5); doc.setTextColor(30,24,18);
        const lines = doc.splitTextToSize(node.data.t, pCardW-3);
        doc.text(lines.slice(0,4), pCardX+2, clampedY+8, { lineHeightFactor:1.25 });
      });

      // Footer
      doc.setFont('times','italic'); doc.setFontSize(6); doc.setTextColor(150,130,110);
      doc.text('Frise chronologique · France XIXe siècle', M, PH-4);
      doc.text(`${Math.round(pageStart)} – ${Math.round(pageEnd)}`, PW-M, PH-4, { align:'right' });
      pageStart = pageEnd;
    }

    // Page numbers
    const total = doc.internal.getNumberOfPages();
    for (let p=1;p<=total;p++) {
      doc.setPage(p);
      doc.setFont('times','normal'); doc.setFontSize(6); doc.setTextColor(150,130,110);
      doc.text(`${p} / ${total}`, PW/2, PH-4, { align:'center' });
    }

    doc.save('frise_chronologique_france.pdf');
    modalBody.textContent = '✓ PDF téléchargé avec succès !';
  } catch(err) {
    modalBody.textContent = 'Erreur : ' + err.message;
    console.error(err);
  }
}
</script>
</body>
</html>
